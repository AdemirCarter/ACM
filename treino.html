<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="intro.css">
    <link rel="stylesheet" href="treino.css">
    <link href='https://fonts.googleapis.com/css?family=League Spartan' rel='stylesheet'>
</head>
<body">
    <meta name="theme-color" content="#000000">

    <div id="intro">
        <img src="https://img.icons8.com/?size=100&id=100016&format=png&color=ffd000" alt="">
        <p>CarterACM</p>
        <a href="treino.html">Treino</a>
        <a href="profile.html">Profile</a>
        <a href="">Contato</a>
    </div>

    <div id="treino">
        <button id="left">
            <img src="https://img.icons8.com/?size=100&id=101310&format=png&color=ffffff" alt="">
        </button>
        <button id="right">
            <img src="https://img.icons8.com/?size=100&id=100530&format=png&color=ffffff" alt="">
        </button>

        <div id="ficha">
            <div id="treino-a" style="display: block;"><p id="title">Treino A</p> <br></div>
            <div id="treino-b" style="display: none;"><p id="title">Treino B</p> <br></div>
            <div id="treino-c" style="display: none;"><p id="title">Treino C</p> <br></div>
            <div id="treino-d" style="display: none;"><p id="title">Treino D</p> <br></div>
            <div id="treino-e" style="display: none;"><p id="title">Treino E</p> <br></div>
        </div>

        <button id="save">Salvar</button>
    </div>
</body>

<script>
    const ficha_div = document.getElementById("ficha")

    const ficha = {
        "treino-a": document.getElementById("treino-a"),
        "treino-b": document.getElementById("treino-b"),
        "treino-c": document.getElementById("treino-c"),
        "treino-d": document.getElementById("treino-d"),
        "treino-e": document.getElementById("treino-e")
    }

    const save = document.getElementById("save")

    save.addEventListener("click", function() {
        const peso = document.querySelectorAll("input.peso")
        peso.forEach(peso_save => {
            localStorage.setItem(peso_save.id, peso_save.value)
        });

        const reps = document.querySelectorAll(".reps")
        reps.forEach(reps_save => {
            localStorage.setItem(reps_save.id, reps_save.value)
        });

        const sets = document.querySelectorAll(".sets")
        sets.forEach(sets_save => {
            localStorage.setItem(sets_save.id, sets_save.value)
        });
            
    })
</script>

<script src="next.js"></script>
<script src="database.js"></script>
</html>
